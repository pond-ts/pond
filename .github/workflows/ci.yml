name: CI

on:
  push:
    branches:
      - main
  pull_request:
  # Manual trigger — lets `verify` be run on demand (e.g. when push/PR event
  # delivery is disrupted, as after the pond-ts/pond org transfer). Mirrors the
  # workflow_dispatch the charts-e2e workflow already has.
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 24.x

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build and tests
        run: npm run verify

      - name: Verify package contents
        if: matrix.node-version == '24.x'
        run: npm pack --dry-run --workspace=pond-ts
