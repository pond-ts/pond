name: charts-e2e

# Real-browser test layers for @pond-ts/charts (Storybook behavior + Playwright
# visual regression). Separate from the main `CI` workflow because it needs a
# browser + a Storybook build; the unit/type/build layers run there via
# `npm run verify`.
on:
  push:
    branches:
      - main
    paths:
      - 'packages/charts/**'
      - '.github/workflows/charts-e2e.yml'
  pull_request:
    paths:
      - 'packages/charts/**'
      - '.github/workflows/charts-e2e.yml'
  # Manual: regenerate the Linux baselines and upload them as an artifact to
  # commit. Canvas pixels are platform-specific, so CI (Linux) is the source of
  # truth for committed baselines — see PLAN.md → Testing strategy.
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Regenerate Linux visual baselines and upload as an artifact'
        type: boolean
        default: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Storybook bundle imports `pond-ts`, which Vite resolves to
      # packages/core/dist — absent on a fresh checkout, so build the packages
      # first (workspaces are dependency-ordered: core → react → charts).
      - name: Build packages
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: packages/charts

      - name: Run Storybook e2e (behavior + visual)
        # In update_baselines mode, append `|| true`: writing a *brand-new*
        # snapshot exits non-zero (Playwright won't silently pass on first
        # creation), which would otherwise skip the upload below. Swallow it so
        # the freshly-written PNGs always upload. The `||`/`&&` ternary lives in
        # the inline string (the only context where a `gh -f` boolean input
        # coerces reliably — `if:`/`continue-on-error:` boolean contexts don't).
        # Normal PR runs (update_baselines=false) append nothing → diffs fail.
        run: npm run test:e2e --workspace=@pond-ts/charts ${{ inputs.update_baselines && '-- --update-snapshots || true' || '' }}

      - name: Upload regenerated baselines
        if: ${{ inputs.update_baselines }}
        uses: actions/upload-artifact@v4
        with:
          name: charts-linux-baselines
          path: packages/charts/e2e/**/*-linux.png
          if-no-files-found: error

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/charts/playwright-report/
          retention-days: 7
