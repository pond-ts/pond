name: Docs

on:
  # Docs publish only on release tags so the live site always reflects
  # the latest *published* version on npm, not in-flight work on main.
  # Use workflow_dispatch for a preview deploy off an unreleased commit.
  #
  # NB: we deploy via wrangler-from-Actions rather than Cloudflare's native
  # Git integration precisely to keep this tag gate — native auto-build would
  # deploy every push to main.
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Install library dependencies
        run: npm ci

      - name: Build packages
        # packages/core/dist is needed for @pond-ts/react's TypeDoc pass
        # to resolve the 'pond-ts' import. Local dev has this lying
        # around from previous builds; CI starts fresh.
        run: npm run build

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Build Storybook
        # Deployed as its own Cloudflare Pages project (pond-storybook) and
        # served at pond-ts.org/storybook/ via the router Worker. Vite's
        # Storybook builder emits relative asset paths, so it serves cleanly
        # from the project root behind the prefix-stripping proxy route.
        working-directory: packages/charts
        run: npm run build-storybook -- --quiet -o storybook-static

      - name: Deploy docs to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=pond-docs --branch=main

      - name: Deploy Storybook to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/charts/storybook-static --project-name=pond-storybook --branch=main
