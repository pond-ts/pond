name: Docs

on:
  # Docs publish only on release tags so the live site always reflects
  # the latest *published* version on npm, not in-flight work on main.
  # Use workflow_dispatch for a preview deploy off an unreleased commit.
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install library dependencies
        run: npm ci

      - name: Build packages
        # packages/core/dist is needed for @pond-ts/react's TypeDoc pass
        # to resolve the 'pond-ts' import. Local dev has this lying
        # around from previous builds; CI starts fresh.
        run: npm run build

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Build Storybook
        # The docs site's interactive reference surface (docs plan, "Storybook
        # = the disciplined API-adjacent knob walk"). Vite's Storybook builder
        # emits relative asset paths, so it's safe to nest under any subpath —
        # no baseUrl config needed. Runs after the website build so it can
        # land straight into the artifact tree.
        working-directory: packages/charts
        run: npm run build-storybook -- --quiet -o ../../website/build/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
