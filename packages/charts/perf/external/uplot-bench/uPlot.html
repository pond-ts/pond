<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>μPlot Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="uplot-dist/uPlot.min.css" />
    <style>
      body {
        margin: 0;
      }

      .u-legend.u-inline .u-value {
        width: 150px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <script src="uplot-dist/uPlot.iife.min.js"></script>
    <h2 id="wait">Loading lib....</h2>

    <script>
      function round2(val) {
        return Math.round(val * 100) / 100;
      }

      function round3(val) {
        return Math.round(val * 1000) / 1000;
      }

      function prepData(packed) {
        const t0 = performance.now();

        // epoch,idl,recv,send,read,writ,used,free

        const numFields = packed[0];

        packed = packed.slice(numFields + 1);

        // 55,550 data points x 3 series = 166,650
        let data = [
          Array(packed.length / numFields),
          Array(packed.length / numFields),
          Array(packed.length / numFields),
          Array(packed.length / numFields),
        ];

        for (let i = 0, j = 0; i < packed.length; i += numFields, j++) {
          data[0][j] = packed[i] * 60; // * 1e3
          data[1][j] = round3(100 - packed[i + 1]);
          data[2][j] = round2(
            (100 * packed[i + 5]) / (packed[i + 5] + packed[i + 6]),
          );
          data[3][j] = packed[i + 3];
        }

        window.__prepMs = performance.now() - t0;

        return data;
      }

      function makeChart(data) {
        const t0 = performance.now();

        const opts = {
          title: 'Server Events',
          width: 1920,
          height: 600,
          series: [
            {},
            {
              label: 'CPU',
              scale: '%',
              value: (u, v) => (v == null ? null : v.toFixed(1) + '%'),
              stroke: 'red',
              width: 1 / devicePixelRatio,
            },
            {
              label: 'RAM',
              scale: '%',
              value: (u, v) => (v == null ? null : v.toFixed(1) + '%'),
              stroke: 'blue',
              width: 1 / devicePixelRatio,
            },
            {
              label: 'TCP Out',
              scale: 'mb',
              value: (u, v) => (v == null ? null : v.toFixed(2) + ' MB'),
              stroke: 'green',
              width: 1 / devicePixelRatio,
            },
          ],
          axes: [
            {},
            {
              scale: '%',
              values: (u, vals, space) => vals.map((v) => +v.toFixed(1) + '%'),
            },
            {
              side: 1,
              scale: 'mb',
              size: 60,
              values: (u, vals, space) =>
                vals.map((v) => +v.toFixed(2) + ' MB'),
              grid: { show: false },
            },
          ],
        };

        let uplot = new uPlot(opts, data, document.body);
        const chartSyncMs = performance.now() - t0;

        Promise.resolve().then(() => {
          wait.textContent = 'Done!';
          window.__bench = {
            lib: 'uPlot',
            count: data[0].length,
            prepMs: window.__prepMs,
            chartSyncMs,
            chartMs: performance.now() - t0,
            done: true,
          };
        });
      }

      let wait = document.getElementById('wait');
      wait.textContent = 'Fetching data.json (2.07MB)....';
      fetch('data.json')
        .then((r) => r.json())
        .then((packed) => {
          wait.textContent = 'Rendering...';
          let data = prepData(packed);
          setTimeout(() => makeChart(data), 0);
        });
    </script>
  </body>
</html>
